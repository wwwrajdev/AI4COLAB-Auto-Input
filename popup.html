<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4COLAB Auto Input</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.07);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --accent-blue: #4285F4;
            --accent-green: #34A853;
            --accent-red: #EA4335;
            --accent-yellow: #FBBC05;
        }

        body {
            width: 370px;
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0d0d18 0%, #141428 100%);
            padding: 20px 22px 16px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid var(--border-glass);
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(66, 133, 244, 0.06) 0%, transparent 70%);
            animation: headerGlow 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes headerGlow {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(5%, 5%);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        .logo-container svg {
            width: 200px;
            height: 44px;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        /* Container */
        .container {
            background: var(--bg-primary);
            padding: 16px 18px 18px;
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            padding: 14px 12px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stat:hover {
            transform: translateY(-2px);
            border-color: rgba(66, 133, 244, 0.2);
            box-shadow: 0 8px 24px rgba(66, 133, 244, 0.08);
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat:hover::before {
            opacity: 1;
        }

        .stat-icon {
            font-size: 18px;
            margin-bottom: 4px;
            display: block;
        }

        .stat-number {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .stat:nth-child(2) .stat-number {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-yellow));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 500;
        }

        /* Instructions */
        .instructions {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 14px;
        }

        .instructions h3 {
            font-size: 12px;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .instructions h3::before {
            content: '⚡';
            font-size: 13px;
        }

        .instructions ul {
            list-style: none;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .instructions li {
            padding: 4px 0;
            padding-left: 22px;
            position: relative;
            line-height: 1.5;
            transition: color 0.2s;
        }

        .instructions li:hover {
            color: var(--text-primary);
        }

        .instructions li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-blue);
            box-shadow: 0 0 6px rgba(66, 133, 244, 0.4);
        }

        .instructions li:nth-child(2)::before {
            background: var(--accent-green);
            box-shadow: 0 0 6px rgba(52, 168, 83, 0.4);
        }

        .instructions li:nth-child(3)::before {
            background: var(--accent-red);
            box-shadow: 0 0 6px rgba(234, 67, 53, 0.4);
        }

        .instructions li:nth-child(4)::before {
            background: var(--accent-yellow);
            box-shadow: 0 0 6px rgba(251, 188, 5, 0.4);
        }

        .instructions li:nth-child(5)::before {
            background: var(--accent-blue);
            box-shadow: 0 0 6px rgba(66, 133, 244, 0.4);
        }

        .kbd {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-blue);
            font-family: 'Poppins', monospace;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #6ea8fe 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(66, 133, 244, 0.35);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn+.btn {
            margin-top: 8px;
        }

        /* Footer brand */
        .footer-brand {
            text-align: center;
            padding: 10px 0 4px;
            font-size: 9px;
            color: rgba(136, 136, 160, 0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <svg width="200" height="44" viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg" role="img"
                aria-label="AI4COLAB logo">
                <defs>
                    <style>
                        .brand-text {
                            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
                            font-size: 52px;
                            font-weight: 700;
                            letter-spacing: 0;
                        }
                    </style>
                    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#34A853;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#EA4335;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g transform="translate(5, 15)">
                    <circle cx="25" cy="25" r="23" fill="none" stroke="url(#iconGrad)" stroke-width="3" />
                    <circle cx="25" cy="15" r="3.5" fill="#4285F4" />
                    <circle cx="35" cy="25" r="3.5" fill="#34A853" />
                    <circle cx="25" cy="35" r="3.5" fill="#EA4335" />
                    <circle cx="15" cy="25" r="3.5" fill="#FBBC05" />
                    <line x1="25" y1="15" x2="35" y2="25" stroke="#4285F4" stroke-width="2" opacity="0.6" />
                    <line x1="35" y1="25" x2="25" y2="35" stroke="#34A853" stroke-width="2" opacity="0.6" />
                    <line x1="25" y1="35" x2="15" y2="25" stroke="#EA4335" stroke-width="2" opacity="0.6" />
                    <line x1="15" y1="25" x2="25" y2="15" stroke="#FBBC05" stroke-width="2" opacity="0.6" />
                </g>
                <text x="70" y="60" class="brand-text">
                    <tspan fill="#4285F4">A</tspan>
                    <tspan fill="#EA4335">I</tspan>
                    <tspan fill="#FBBC05">4</tspan>
                    <tspan fill="#4285F4">C</tspan>
                    <tspan fill="#34A853">O</tspan>
                    <tspan fill="#EA4335">L</tspan>
                    <tspan fill="#4285F4">A</tspan>
                    <tspan fill="#34A853">B</tspan>
                </text>
            </svg>
        </div>
        <p class="subtitle">Smart Auto-Input Suggestions</p>
    </header>
    <div class="container">
        <div class="stats">
            <div class="stat">
                <span class="stat-icon">📝</span>
                <div class="stat-number" id="totalSuggestions">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <span class="stat-icon">✅</span>
                <div class="stat-number" id="usedCount">0</div>
                <div class="stat-label">Used</div>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Use</h3>
            <ul>
                <li>Click on any empty input field</li>
                <li>Suggestions appear automatically</li>
                <li>Press <span class="kbd">Tab</span> to cycle options</li>
                <li>Press <span class="kbd">Enter</span> to accept</li>
                <li>Press <span class="kbd">Esc</span> to dismiss</li>
            </ul>
        </div>

        <button id="resetBtn" class="btn btn-primary">🔄 Reset Used Suggestions</button>
        <button id="dashboardBtn" class="btn btn-secondary">📊 Open Dashboard</button>

        <div class="footer-brand">Powered by AI4COLAB</div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
